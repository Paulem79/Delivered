on:
  push

jobs:
  release:
    name: release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-gnu
            archive: zip
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            archive: tar.gz tar.xz tar.zst
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            archive: tar.gz tar.xz tar.zst
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            archive: zip
            os: macos-latest
          - target: aarch64-apple-darwin
            archive: zip
            os: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Compile and release
        if: matrix.os == 'ubuntu-latest'
        id: compile
        uses: rust-build/rust-build.action@v1.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          RUSTTARGET: ${{ matrix.target }}
          ARCHIVE_TYPES: ${{ matrix.archive }}
          TOOLCHAIN_VERSION: stable

      - name: Install Rust target
        if: matrix.os == 'macos-latest'
        run: rustup target add ${{ matrix.target }}

      - name: Compile and release (macOS)
        if: matrix.os == 'macos-latest'
        id: macos-compile
        run: |
          cargo build --release --target ${{ matrix.target }}
          zip -j delivered-rust-${{ matrix.target }}.zip target/${{ matrix.target }}/release/delivered-rust
          shasum -a 256 delivered-rust-${{ matrix.target }}.zip > delivered-rust-${{ matrix.target }}.zip.sha256
          echo "BUILT_ARCHIVE=delivered-rust-${{ matrix.target }}.zip" >> $GITHUB_OUTPUT
          echo "BUILT_CHECKSUM=delivered-rust-${{ matrix.target }}.zip.sha256" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: Binary-${{ matrix.target }}
          path: |
            ${{ steps.compile.outputs.BUILT_ARCHIVE || steps.macos-compile.outputs.BUILT_ARCHIVE }}
            ${{ steps.compile.outputs.BUILT_CHECKSUM || steps.macos-compile.outputs.BUILT_CHECKSUM }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.sha }}
          tag_name: release-${{ github.sha }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ${{ steps.compile.outputs.BUILT_ARCHIVE || steps.macos-compile.outputs.BUILT_ARCHIVE }}
            ${{ steps.compile.outputs.BUILT_CHECKSUM || steps.macos-compile.outputs.BUILT_CHECKSUM }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}