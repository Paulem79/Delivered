on:
  push

jobs:
  release:
    name: release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-gnu
            archive: zip
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            archive: tar.gz tar.xz tar.zst
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            archive: tar.gz tar.xz tar.zst
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            archive: zip
            os: macos-latest
          - target: aarch64-apple-darwin
            archive: zip
            os: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Compile and release
        if: matrix.os == 'ubuntu-latest' && matrix.target != 'aarch64-unknown-linux-musl'
        id: compile
        uses: rust-build/rust-build.action@v1.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          RUSTTARGET: ${{ matrix.target }}
          ARCHIVE_TYPES: ${{ matrix.archive }}
          TOOLCHAIN_VERSION: stable

      - name: Compile and release (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        id: aarch64-linux-compile
        run: |
          curl -sL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv cross /usr/local/bin/
          cross build --release --target ${{ matrix.target }}
          
          tar -czf delivered-rust-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release delivered-rust
          tar -cJf delivered-rust-${{ matrix.target }}.tar.xz -C target/${{ matrix.target }}/release delivered-rust
          tar --zstd -cf delivered-rust-${{ matrix.target }}.tar.zst -C target/${{ matrix.target }}/release delivered-rust
          
          shasum -a 256 delivered-rust-${{ matrix.target }}.tar.gz > delivered-rust-${{ matrix.target }}.tar.gz.sha256
          shasum -a 256 delivered-rust-${{ matrix.target }}.tar.xz > delivered-rust-${{ matrix.target }}.tar.xz.sha256
          shasum -a 256 delivered-rust-${{ matrix.target }}.tar.zst > delivered-rust-${{ matrix.target }}.tar.zst.sha256
          
          {
            echo "BUILT_ARCHIVE<<EOF"
            echo "delivered-rust-${{ matrix.target }}.tar.gz"
            echo "delivered-rust-${{ matrix.target }}.tar.xz"
            echo "delivered-rust-${{ matrix.target }}.tar.zst"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          
          {
            echo "BUILT_CHECKSUM<<EOF"
            echo "delivered-rust-${{ matrix.target }}.tar.gz.sha256"
            echo "delivered-rust-${{ matrix.target }}.tar.xz.sha256"
            echo "delivered-rust-${{ matrix.target }}.tar.zst.sha256"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install Rust target
        if: matrix.os == 'macos-latest'
        run: rustup target add ${{ matrix.target }}

      - name: Compile and release (macOS)
        if: matrix.os == 'macos-latest'
        id: macos-compile
        run: |
          cargo build --release --target ${{ matrix.target }}
          zip -j delivered-rust-${{ matrix.target }}.zip target/${{ matrix.target }}/release/delivered-rust
          shasum -a 256 delivered-rust-${{ matrix.target }}.zip > delivered-rust-${{ matrix.target }}.zip.sha256
          echo "BUILT_ARCHIVE=delivered-rust-${{ matrix.target }}.zip" >> $GITHUB_OUTPUT
          echo "BUILT_CHECKSUM=delivered-rust-${{ matrix.target }}.zip.sha256" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: Binary-${{ matrix.target }}
          path: |
            ${{ steps.compile.outputs.BUILT_ARCHIVE || steps.macos-compile.outputs.BUILT_ARCHIVE || steps.aarch64-linux-compile.outputs.BUILT_ARCHIVE }}
            ${{ steps.compile.outputs.BUILT_CHECKSUM || steps.macos-compile.outputs.BUILT_CHECKSUM || steps.aarch64-linux-compile.outputs.BUILT_CHECKSUM }}

  publish:
    name: Publish Release
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: Binary-*
          merge-multiple: true
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.sha }}
          tag_name: release-${{ github.sha }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: release-artifacts/*
